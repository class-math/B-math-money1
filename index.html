<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>旅行計画シミュレーター</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 600px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .result { font-size: 1.2em; color: #2c3e50; font-weight: bold; background: #e8f4fd; padding: 15px; border-radius: 4px; }
        small { color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚢 旅行計画シミュレーター</h2>
    
    <div class="item-group">
        <label>旅行の人数（名）</label>
        <input type="number" id="count" value="2" oninput="calculate()">
    </div>

    <div class="item-group">
        <label>宿（1部屋/2名分の料金）</label>
        <input type="number" id="hotel" placeholder="例: 15000" oninput="calculate()">
        <small>※2名ごとに1部屋として計算します</small>
    </div>

    <div class="item-group">
        <label>食事（1名あたりの料金）</label>
        <input type="number" id="meal" placeholder="例: 3000" oninput="calculate()">
    </div>

    <div class="item-group">
        <label>余暇（グループ全員の料金）</label>
        <input type="number" id="leisure" placeholder="例: 5000" oninput="calculate()">
        <small>※アクティビティ1回分などの固定費</small>
    </div>

    <div class="result">
        合計金額: <span id="total">0</span> 円
    </div>
</div>

<script>
function calculate() {
    const n = parseFloat(document.getElementById('count').value) || 0;
    const hotelPrice = parseFloat(document.getElementById('hotel').value) || 0;
    const mealPrice = parseFloat(document.getElementById('meal').value) || 0;
    const leisurePrice = parseFloat(document.getElementById('leisure').value) || 0;

    // 宿の計算：人数÷2（端数切り上げ）で部屋数を出して計算
    const rooms = Math.ceil(n / 2);
    const totalHotel = rooms * hotelPrice;

    // 食事の計算
    const totalMeal = n * mealPrice;

    // 合計
    const total = totalHotel + totalMeal + leisurePrice;

    document.getElementById('total').innerText = total.toLocaleString();
}
</script>

</body>
</html>
